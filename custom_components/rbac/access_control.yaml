version: '3.0'
description: RBAC Access Control Configuration (V3 - Pure Whitelist Multi-Role)
enabled: true
show_notifications: true
send_event: false
frontend_blocking_enabled: false
log_deny_list: false
allow_chained_actions: false
last_rejection: Never
last_user_rejected: None
default_restrictions:
  domains:
    homeassistant:
      hide: false
      services:
      - restart
      - stop
      - reload_config_entry
      - check_config
    system_log:
      hide: true
      services:
      - write
      - clear
    hassio:
      hide: true
      services:
      - host_reboot
      - host_shutdown
      - supervisor_update
      - supervisor_restart
  entities: {}
users: {}
roles:
  admin:
    description: Administrator with full access
    admin: true
    permissions:
      domains: {}
      entities: {}
    template: ""
    merge_condition: true
  user:
    description: Standard user with limited permissions
    admin: false
    permissions:
      domains: {}
      entities: {}
    template: ""
    merge_condition: true
  guest:
    description: Guest with minimal permissions
    admin: false
    permissions:
      domains: {}
      entities: {}
    template: ""
    merge_condition: true